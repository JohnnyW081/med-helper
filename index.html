<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title data-i18n="app_title">用药助手 v2.1</title>

<style>
:root {
    --bg: #0D0D0D;
    --card: #1A1A1A;
    --card-alt: #252525;
    --primary: #00D4AA;
    --primary-light: #0A3D3A;
    --primary-dark: #00B894;
    --accent: #FF6B6B;
    --accent-light: #3D1F1F;
    --success: #00D68F;
    --success-light: #0D2920;
    --danger: #FF5C5C;
    --danger-light: #3D1F1F;
    --text: #FFFFFF;
    --text-secondary: #B3B3B3;
    --text-muted: #666666;
    --border: #2A2A2A;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
    --radius: 12px;
    --radius-lg: 16px;
    --radius-pill: 9999px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { height: 100%; }


/* ========== 多配色方案 ========== */
:root[data-theme="midnight"] {
    --bg: #0D0D0D;
    --card: #1A1A1A;
    --card-alt: #252525;
    --primary: #00D4AA;
    --primary-light: #0A3D3A;
    --primary-dark: #00B894;
    --accent: #FF6B6B;
    --accent-light: #3D1F1F;
    --success: #00D68F;
    --success-light: #0D2920;
    --danger: #FF5C5C;
    --danger-light: #3D1F1F;
    --text: #FFFFFF;
    --text-secondary: #B3B3B3;
    --text-muted: #666666;
    --border: #2A2A2A;
    background-image: 
        radial-gradient(circle at 20% 30%, rgba(0,212,170,0.08) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(255,107,107,0.06) 0%, transparent 35%);
}

:root[data-theme="sunset"] {
    --bg: #1A0A0A;
    --card: #2D1515;
    --card-alt: #3D2020;
    --primary: #FF6B35;
    --primary-light: #3D1F0D;
    --primary-dark: #CC5500;
    --accent: #00D4AA;
    --accent-light: #0A3D30;
    --success: #FFD700;
    --success-light: #3D3500;
    --danger: #FF4444;
    --danger-light: #3D0000;
    --text: #FFE4E1;
    --text-secondary: #BFA0A0;
    --text-muted: #6B4A4A;
    --border: #4A2020;
    background-image: 
        radial-gradient(circle at 25% 35%, rgba(255,107,53,0.08) 0%, transparent 40%),
        radial-gradient(circle at 75% 65%, rgba(255,215,0,0.05) 0%, transparent 30%);
}

:root[data-theme="black"] {
    --bg: #000000;
    --card: #0A0A0A;
    --card-alt: #141414;
    --primary: #FFFFFF;
    --primary-light: #1A1A1A;
    --primary-dark: #CCCCCC;
    --accent: #888888;
    --accent-light: #111111;
    --success: #CCCCCC;
    --success-light: #1A1A1A;
    --danger: #AAAAAA;
    --danger-light: #111111;
    --text: #FFFFFF;
    --text-secondary: #CCCCCC;
    --text-muted: #666666;
    --border: #222222;
    background-image: none;
}

:root[data-theme="white"] {
    --bg: #FFFFFF;
    --card: #F8F9FA;
    --card-alt: #E9ECEF;
    --primary: #007BFF;
    --primary-light: #E7F1FF;
    --primary-dark: #0056B3;
    --accent: #FF6B6B;
    --accent-light: #FFF0F0;
    --success: #28A745;
    --success-light: #E8F5E9;
    --danger: #DC3545;
    --danger-light: #FDECEA;
    --text: #212529;
    --text-secondary: #6C757D;
    --text-muted: #ADB5BD;
    --border: #DEE2E6;
    background-image: none;
}

/* ========== 语言选择器 ========== */
.lang-bar {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 6px 0;
}
.lang-btn {
    padding: 4px 12px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
}
.lang-btn.active {
    border-color: var(--primary);
    color: var(--primary);
    background: var(--primary-light);
}

body {
    height: 100vh;
    max-width: 520px;
    margin: 0 auto;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    font-family: 'Noto Sans SC', 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    background-image: 
        radial-gradient(circle at 20% 30%, rgba(0,212,170,0.08) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(255,107,107,0.06) 0%, transparent 35%);
}

button, input, textarea, select { font-family: inherit; }
button { border: none; cursor: pointer; }
a { color: inherit; }

/* ========== 顶部区域 ========== */
.top-bar {
    flex-shrink: 0;
    padding: 20px 20px 16px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    position: relative;
    overflow: hidden;
    z-index: 10;
}

.top-bar::before {
    content: "";
    position: absolute;
    top: -50%;
    right: -20%;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    pointer-events: none;
}

:root[data-theme="black"] .top-bar {
    background: #000000;
    border-bottom: 1px solid #222222;
}

:root[data-theme="black"] .top-bar::before {
    display: none;
}

.top-grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1fr 1.4fr 1fr;
    align-items: center;
    gap: 8px;
}

.top-cell {
    display: flex;
    align-items: center;
    min-width: 0;
}

.top-cell:not(:last-child)::after {
    content: "";
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 1px;
    height: 24px;
    background: rgba(255,255,255,0.2);
}

.top-brand { padding-left: 2px; }
.top-brand .title {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
}

.top-date { justify-content: center; }
.top-date .date {
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    font-weight: 500;
    text-align: center;
}

.top-time { justify-content: flex-end; padding-right: 2px; }
.top-time .clock {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
}

/* 下次提醒横幅 */
.remind-row {
    position: relative;
    z-index: 1;
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 12px;
    background: rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    gap: 10px;
}

.remind-label {
    font-size: 13px;
    color: rgba(255,255,255,0.8);
    font-weight: 600;
    flex-shrink: 0;
}

.remind-name {
    flex: 1;
    min-width: 0;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.remind-count {
    flex-shrink: 0;
    padding: 5px 10px;
    border-radius: var(--radius-pill);
    background: rgba(255,255,255,0.2);
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
}

/* 今日进度条 */
.progress-panel {
    position: relative;
    z-index: 1;
    margin-top: 10px;
}

.progress-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
}

.progress-head .label {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
}

.progress-head .remain {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
}

.progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
}

.bar-bg {
    flex: 1;
    height: 8px;
    border-radius: var(--radius-pill);
    background: rgba(255,255,255,0.2);
    overflow: hidden;
}

.bar-fg {
    height: 100%;
    width: 0%;
    border-radius: inherit;
    background: #fff;
    transition: width 0.45s ease;
}

.pnum {
    flex-shrink: 0;
    min-width: 44px;
    text-align: right;
    font-size: 15px;
    font-weight: 800;
    color: #fff;
}

/* ========== 主内容区 ========== */
.main-content {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 16px 16px 10px;
    display: flex;
    flex-direction: column;
}

.carousel-wrap {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.pill-card {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-radius: var(--radius-lg);
    background: var(--card);
    border: 1px solid var(--border);
    position: relative;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.pill-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
}

.pill-card .status-tag {
    position: absolute;
    top: 14px;
    left: 14px;
    z-index: 2;
    padding: 5px 12px;
    border-radius: var(--radius-pill);
    background: var(--primary-light);
    color: var(--primary);
    font-size: 12px;
    font-weight: 700;
}

.photo-area {
    height: 220px;
    flex-shrink: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: var(--card-alt);
    cursor: pointer;
}

.photo-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.photo-placeholder {
    text-align: center;
    font-size: 16px;
    font-weight: 500;
    color: var(--text-muted);
}

.fake-capsule {
    width: 80px;
    height: 36px;
    margin: 0 auto 18px;
    border-radius: var(--radius-pill);
    transform: rotate(-45deg);
    background: linear-gradient(90deg, var(--primary) 0%, var(--primary) 48%, var(--danger) 52%, var(--danger) 100%);
    position: relative;
}

.fake-capsule::after {
    content: "";
    position: absolute;
    right: 10px;
    top: 7px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.6);
}

.pill-card .body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 18px 20px 20px;
}

.med-meta {
    margin-bottom: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
}

.name-dose-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}

.name-dose-row .name {
    font-size: 28px;
    line-height: 1.1;
    font-weight: 900;
    color: var(--text);
    letter-spacing: -0.5px;
}

.name-dose-row .dose-text {
    padding: 6px 14px;
    border-radius: var(--radius-pill);
    background: var(--card-alt);
    border: 1px solid var(--border);
    font-size: 15px;
    font-weight: 600;
    color: var(--text-secondary);
    white-space: nowrap;
}

.med-tip {
    margin-top: 12px;
    padding: 10px 12px;
    border-radius: 12px;
    background: var(--primary-light);
    border: 1px solid var(--primary);
    font-size: 13px;
    font-weight: 500;
    color: var(--primary);
    line-height: 1.5;
}

/* ========== 快捷操作 ========== */
.quick-actions {
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    margin-top: 10px;
}

.quick-actions button {
    flex: 1;
    padding: 18px 10px;
    border-radius: var(--radius-lg);
    font-weight: 700;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
}

.ate-btn {
    background: var(--success-light);
    color: var(--success);
    border: 1px solid var(--success);
}

.ate-btn:hover {
    background: var(--success);
    color: #000;
}

.emer-btn {
    background: var(--danger-light);
    color: var(--danger);
    border: 1px solid var(--danger);
}

.emer-btn:hover {
    background: var(--danger);
    color: #000;
}

.btn-main {
    font-size: 20px;
    font-weight: 800;
}

.btn-sub {
    font-size: 12px;
    font-weight: 500;
    opacity: 0.8;
}

/* ========== 已完成 ========== */
.done-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    text-align: center;
}

.done-state .big {
    font-size: 64px;
    line-height: 1;
    color: var(--success);
    margin-bottom: 16px;
}

.done-state h2 {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 8px;
    color: var(--text);
}

.done-state p {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
}

/* ========== 设置页 ========== */
.section-title {
    font-size: 16px;
    font-weight: 800;
    margin: 18px 0 10px;
    color: var(--text);
    letter-spacing: 0.3px;
}

.med-set {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
}

.med-set .top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.med-set .top .label {
    font-weight: 700;
    font-size: 14px;
    color: var(--text-secondary);
}

.med-set .top .del {
    padding: 4px 12px;
    border-radius: 8px;
    background: var(--danger-light);
    color: var(--danger);
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--danger);
}

.med-set .row {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
}

.med-set .fld {
    flex: 1;
}

.med-set .fld label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 4px;
}

.med-set .fld input {
    width: 100%;
    padding: 8px 10px;
    border-radius: 8px;
    background: var(--card-alt);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 14px;
}

.med-set .fld input:focus {
    outline: none;
    border-color: var(--primary);
}

.photo-set {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 6px;
}

.photo-set input[type="file"] { display: none; }

.photo-box {
    width: 60px;
    height: 60px;
    border-radius: 10px;
    background: var(--card-alt);
    border: 1px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    overflow: hidden;
    position: relative;
}

.photo-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.photo-box .hint {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.3;
}

.photo-clr {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    cursor: pointer;
}

.add-btn {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius);
    border: 2px dashed var(--border);
    background: var(--card);
    color: var(--text-secondary);
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 6px;
}

.add-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: var(--primary-light);
}

.contact-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
}

.contact-row .fld { flex: 1; }

.contact-row .fld label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 4px;
}

.contact-row .fld input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 14px;
}

.contact-row .fld input:focus {
    outline: none;
    border-color: var(--primary);
}

.save-btn {
    width: 100%;
    padding: 16px;
    border-radius: var(--radius);
    background: var(--primary);
    color: #000;
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 20px;
}

.save-btn:hover {
    opacity: 0.9;
}

/* ========== 主题选择 ========== */
.theme-selector {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 12px 0;
}

.theme-btn {
    flex: 1;
    min-width: calc(50% - 4px);
    padding: 10px 8px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--card);
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
}

.theme-btn.active {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary);
    box-shadow: none;
}

.theme-btn:hover {
    border-color: var(--primary);
    transform: translateY(-2px);
}

/* ========== 回收指南 ========== */
.recycle-area {
    margin-bottom: 60px;
}

.recycle-btn {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius);
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 600;
}

.recycle-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
}

/* ========== Modal ========== */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}

.modal-overlay.show {
    opacity: 1;
    pointer-events: all;
}

.modal-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    max-width: 100%;
    width: 400px;
    max-height: 80vh;
    overflow-y: auto;
}

.modal-box .icon {
    font-size: 40px;
    text-align: center;
    margin-bottom: 12px;
}

.modal-box h3 {
    font-size: 18px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 12px;
    color: var(--text);
}

.modal-box p {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
    margin-bottom: 10px;
}

.modal-box .tip {
    background: var(--card-alt);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text-secondary);
    margin-bottom: 12px;
}

.modal-close {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius);
    background: var(--primary);
    color: #000;
    font-size: 16px;
    font-weight: 800;
}

.modal-close:hover {
    opacity: 0.9;
}

/* ========== Lightbox ========== */
.lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}

.lightbox.show {
    opacity: 1;
    pointer-events: all;
}

.lightbox img {
    max-width: 100%;
    max-height: 80vh;
    border-radius: var(--radius);
}

.lightbox-close {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 20px;
}

/* ========== 底部TAB ========== */
.tab-bar {
    flex-shrink: 0;
    display: flex;
    background: var(--card);
    border-top: 1px solid var(--border);
    padding: 8px 0 env(safe-area-inset-bottom, 8px);
}

.tab-item {
    flex: 1;
    text-align: center;
    padding: 10px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    border-radius: 10px;
    margin: 0 6px;
    transition: all 0.3s ease;
}

.tab-item.active {
    background: var(--primary-light);
    color: var(--primary);
}

.tab-item:hover {
    background: var(--card-alt);
}

/* ========== Toast ========== */
.toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    padding: 10px 24px;
    border-radius: var(--radius-pill);
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    z-index: 300;
    white-space: nowrap;
}

.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* ========== 轮播点 ========== */
.dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 6px 0;
    flex-shrink: 0;
}

.dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--card-alt);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.3s ease;
}

.dot.active {
    background: var(--primary);
    border-color: var(--primary);
    width: 24px;
    border-radius: 4px;
}

/* ========== 隐藏 ========== */
.hidden { display: none !important; }

/* ========== 动画 ========== */
@keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.pill-card {
    animation: slideIn 0.5s ease-out;
}

.fake-capsule {
    animation: float 3s ease-in-out infinite;
}

let CUR_LANG = 'zh';

function t(key, vars) {
    const d = I18N[CUR_LANG] || I18N.zh;
    let s = d[key] || I18N.zh[key] || key;
    if (vars) {
        for (const k in vars) {
            s = s.replace('{' + k + '}', vars[k]);
        }
    }
    return s;
}

function translate() {
    // Update data-i18n elements
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        el.textContent = t(key);
    });
    // Update placeholders
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        el.placeholder = t(key);
    });
    // Update title
    const title = document.querySelector('title');
    if (title) title.textContent = t('app_title');
    // Update apple-mobile-web-app-title
    document.querySelector('meta[name="apple-mobile-web-app-title"]')?.setAttribute('content', t('med_helper'));
    // Update language switcher buttons
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === CUR_LANG);
    });
    // Re-render dynamic content
    updateClock();
    renderHome();
    renderSet();
    updateBanner();
}

function setLang(lang) {
    if (lang === CUR_LANG) return;
    CUR_LANG = lang;
    localStorage.setItem('med_lang', lang);
    document.documentElement.lang = lang === 'ja' ? 'ja' : lang === 'en' ? 'en' : 'zh-CN';
    translate();
}

const SK='pill_med';

function today(){
    const d=new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

const DEF=[
    {id:1,name:t('new_med')+' 1',date:today(),time:'08:00',dose:t('dose_default'),photo:'',taken:false},
    {id:2,name:t('new_med')+' 2',date:today(),time:'08:00',dose:t('dose_default'),photo:'',taken:false},
    {id:3,name:t('new_med')+' 3',date:today(),time:'12:00',dose:t('dose_default'),photo:'',taken:false}
];

function ld(){
    try{
        const r=localStorage.getItem(SK);
        if(r){
            const d=JSON.parse(r);
            return {
                meds:d.meds||JSON.parse(JSON.stringify(DEF)),
                contact:Object.assign({name:'联系人',phone:'13800138000'},d.contact||{})
            };
        }
    }catch(e){}

    return {
        meds:JSON.parse(JSON.stringify(DEF)),
        contact:{name:'联系人',phone:'13800138000'}
    };
}

function sv(){
    try{
        localStorage.setItem(SK,JSON.stringify({
            meds:ST.meds,
            contact:ST.contact,
            currentTheme:ST.currentTheme||'midnight'
        }));
    }catch(e){}
}

function getToday(){
    const t=today();
    return ST.meds.filter(m=>m.date===t&&!m.taken);
}

const ST={
    meds:[],
    contact:{},
    ci:0,
    timer:null,
    clockTimer:null,
    alarmTimer:null,
    lastAlarmKey:''
};

function T(m){
    const e=document.getElementById('toast');
    e.textContent=m;
    e.classList.add('show');
    clearTimeout(e._t);
    e._t=setTimeout(()=>e.classList.remove('show'),1800);
}

function esc(s){
    return String(s)
        .replace(/"/g,'\\u0022')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
}

function pad(n){
    return String(n).padStart(2,'0');
}

function nowT(){
    const d=new Date();
    return pad(d.getHours())+':'+pad(d.getMinutes());
}

function initAlarm(){
    ST.alarmTimer=setInterval(()=>{
        const n=nowT();

        getToday().forEach(m=>{
            const key=m.id+'-'+today()+'-'+n;
            if(m.time===n&&ST.lastAlarmKey!==key){
                ST.lastAlarmKey=key;
                fireN(m);
            }
        });

        updateBanner();
    },30000);
}

function fireN(m){
    if('Notification' in window&&Notification.permission==='granted'){
        new Notification(t('notification_title'),{
            body:m.name+' - '+m.dose+'（'+m.time+'）',
            icon:m.photo||'',
            tag:'p-'+m.id,
            requireInteraction:true
        });
    }else if('Notification' in window&&Notification.permission==='default'){
        Notification.requestPermission();
    }

    if(navigator.vibrate){
        navigator.vibrate([200,100,200,100,400]);
    }
}

function updateBanner(){
    const p=getToday();
    const nEl=document.getElementById('next-name');
    const cEl=document.getElementById('next-countdown');

    if(!p.length){
        nEl.textContent=t('all_completed');
        cEl.textContent=t('completed');
        return;
    }

    p.sort((a,b)=>a.time.localeCompare(b.time));
    const nx=p[0];

    nEl.textContent=nx.time+' · '+nx.name;

    const [nh,nm]=nx.time.split(':').map(Number);
    const [ch,cm]=nowT().split(':').map(Number);
    const diff=(nh*60+nm)-(ch*60+cm);

    if(diff<=0){
        cEl.textContent=t('time_to_take');
    }else if(diff<60){
        cEl.textContent=diff+t('min_abbr');
    }else{
        cEl.textContent=Math.floor(diff/60)+'h'+(diff%60)+'m';
    }
}

function updateClock(){
    const d=new Date();

    document.getElementById('clock-display').textContent=
        pad(d.getHours())+':'+pad(d.getMinutes());

    const weekDays = CUR_LANG === 'zh'
        ? ['日','一','二','三','四','五','六']
        : CUR_LANG === 'ja'
        ? ['日','月','火','水','木','金','土']
        : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    const yearLabel = CUR_LANG === 'en' ? '/' : CUR_LANG === 'ja' ? '年' : '年';
    const monthLabel = CUR_LANG === 'en' ? '/' : CUR_LANG === 'ja' ? '月' : '月';
    const dayLabel = CUR_LANG === 'en' ? '' : CUR_LANG === 'ja' ? '日' : '日';
    const weekPrefix = CUR_LANG === 'en' ? ' ' : '·周';

    if (CUR_LANG === 'en') {
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        document.getElementById('date-display').textContent =
            months[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear()+' '+weekDays[d.getDay()];
    } else {
        document.getElementById('date-display').textContent =
            d.getFullYear()+yearLabel+
            (d.getMonth()+1)+monthLabel+
            d.getDate()+dayLabel+weekPrefix+
            weekDays[d.getDay()];
    }
}

function renderHome(){
    const p=getToday();
    const t_=today();
    const total=ST.meds.filter(m=>m.date===t_).length;
    const done=total-p.length;
    const pct=total>0?(done/total*100):0;

    document.getElementById('pbar').style.width=pct+'%';
    document.getElementById('pnum').textContent=done+'/'+total;
    document.getElementById('remain-text').textContent=t('remaining',{n:p.length});

    const phone=ST.contact.phone||'13800138000';
    document.getElementById('emer-link').href='tel:'+phone;
    document.getElementById('emer-name').textContent=ST.contact.name||t('emergency_contact');

    if(!p.length){
        document.getElementById('carousel-wrap').classList.add('hidden');
        document.getElementById('quick-actions').classList.add('hidden');
        document.getElementById('done-state').classList.remove('hidden');
        stopCarousel();
        updateBanner();
        return;
    }

    document.getElementById('carousel-wrap').classList.remove('hidden');
    document.getElementById('quick-actions').classList.remove('hidden');
    document.getElementById('done-state').classList.add('hidden');

    if(ST.ci>=p.length)ST.ci=0;

    const de=document.getElementById('dots');
    de.innerHTML='';

    p.forEach((_,i)=>{
        const s=document.createElement('span');
        s.className='dot'+(i===ST.ci?' active':'');
        s.onclick=()=>{
            ST.ci=i;
            upCard();
            restart(p.length);
        };
        de.appendChild(s);
    });

    upCard();
    restart(p.length);
    updateBanner();
}

function upCard(){
    const p=getToday();
    if(!p.length)return;

    const m=p[ST.ci%p.length];

    document.getElementById('med-name').textContent=m.name;
    document.getElementById('med-dose-line').textContent=t('dose_prefix')+'：'+m.dose;
    document.getElementById('med-time-line').textContent=t('med_time')+'：'+m.time;

    const ph=document.getElementById('ph');
    const ri=document.getElementById('real-img');
    const area=document.getElementById('photo-area');

    if(m.photo){
        ph.classList.add('hidden');
        ri.classList.remove('hidden');
        ri.src=m.photo;
        ri.alt=t('photo_alt');
        area.classList.add('has-img');
        area.onclick=function(){
            openLightbox(m.photo);
        };
    }else{
        ph.classList.remove('hidden');
        ri.classList.add('hidden');
        ri.src='';
        area.classList.remove('has-img');
        area.onclick=null;
    }

    document.querySelectorAll('.dot').forEach((d,i)=>{
        d.className='dot'+(i===ST.ci?' active':'');
    });
}

function stopCarousel(){
    if(ST.timer){
        clearInterval(ST.timer);
        ST.timer=null;
    }
}

function restart(n){
    stopCarousel();

    if(n>0){
        ST.timer=setInterval(()=>{
            const p=getToday();

            if(!p.length){
                stopCarousel();
                renderHome();
                return;
            }

            ST.ci=(ST.ci+1)%p.length;
            upCard();
        },4000);
    }
}

function markAte(){
    const p=getToday();

    if(!p.length){
        T(t('no_pending'));
        return;
    }

    const m=p[ST.ci%p.length];

    if(confirm(t('confirm_take',{name:m.name,dose:m.dose}))){
        m.taken=true;
        ST.ci=0;
        sv();
        renderHome();
        T(t('recorded'));
    }
}

function renderSet(){
    const c=document.getElementById('setting-list');
    c.innerHTML='';

    ST.meds.forEach((m,i)=>{
        const d=document.createElement('div');
        d.className='med-set';

        const ph=m.photo
            ?'<div class="photo-box" onclick="document.getElementById(\'f'+i+'\').click()"><img src="'+m.photo+'"><button class="photo-clr" onclick="event.stopPropagation();clrP('+i+')">✕</button></div>'
            :'<div class="photo-box" onclick="document.getElementById(\'f'+i+'\').click()"><div class="hint">'+t('upload_hint')+'</div></div>';

        d.innerHTML=
            '<div class="top"><span class="label">'+t('med_label')+(i+1)+'</span><button class="del" onclick="delM('+i+')">✕</button></div>'+
            '<div class="row">'+
                '<div class="fld"><label>'+t('name_label')+'</label><input type="text" class="fn" value="'+esc(m.name)+'"></div>'+
                '<div class="fld"><label>'+t('date_label')+'</label><input type="date" class="fd" value="'+m.date+'"></div>'+
            '</div>'+
            '<div class="row">'+
                '<div class="fld"><label>'+t('time_label')+'</label><input type="time" class="ft" value="'+m.time+'"></div>'+
                '<div class="fld"><label>'+t('dose_label')+'</label><input type="text" class="fdo" value="'+esc(m.dose)+'"></div>'+
            '</div>'+
            '<div class="photo-set">'+
                ph+
                '<input type="file" accept="image/*" id="f'+i+'" onchange="upP('+i+',this)">'+
            '</div>';

        c.appendChild(d);
    });

    document.getElementById('cname').placeholder=t('contact_name_placeholder');
    document.getElementById('cphone').placeholder=t('phone_placeholder');
    document.getElementById('cname').value=ST.contact.name||'';
    document.getElementById('cphone').value=ST.contact.phone||'';
}

function upP(i,input){
    const f=input.files&&input.files[0];
    if(!f)return;

    const r=new FileReader();

    r.onload=e=>{
        ST.meds[i].photo=e.target.result;
        sv();
        renderSet();
    };

    r.readAsDataURL(f);
}

function clrP(i){
    ST.meds[i].photo='';
    sv();
    renderSet();
}

function addMed(){
    ST.meds.push({
        id:Date.now(),
        name:t('new_med'),
        date:today(),
        time:'08:00',
        dose:t('dose_default'),
        photo:'',
        taken:false
    });

    renderSet();
}

function delM(i){
    if(ST.meds.length<=1){
        T(t('keep_one'));
        return;
    }

    if(confirm(t('confirm_delete',{name:ST.meds[i].name}))){
        ST.meds.splice(i,1);
        renderSet();
    }
}

function saveSet(){
    const items=document.querySelectorAll('.med-set');
    const fresh=[];

    for(let i=0;i<items.length;i++){
        const n=items[i].querySelector('.fn').value.trim();

        if(!n){
            T(t('enter_name'));
            return;
        }

        const old=ST.meds[i]||{};

        fresh.push({
            id:old.id||Date.now()+i,
            name:n,
            date:items[i].querySelector('.fd').value||today(),
            time:items[i].querySelector('.ft').value,
            dose:items[i].querySelector('.fdo').value.trim()||t('dose_default'),
            photo:old.photo||'',
            taken:old.taken||false
        });
    }

    const ph=document.getElementById('cphone').value.trim();

    if(ph&&!/^1[3-9]\d{9}$/.test(ph)){
        T(t('enter_phone'));
        return;
    }

    ST.meds=fresh;
    ST.contact.name=document.getElementById('cname').value.trim()||t('emergency_contact');
    ST.contact.phone=ph;
    ST.ci=0;

    sv();
    T(t('saved',{n:fresh.length}));
    switchTab('elder');
}

function showRecycle(){
    document.getElementById('recycle-modal').classList.add('show');
}

function hideRecycle(){
    document.getElementById('recycle-modal').classList.remove('show');
}

function openLightbox(src){
    if(!src)return;
    document.getElementById('lightbox-img').src=src;
    document.getElementById('lightbox').classList.add('show');
}

function closeLightbox(){
    document.getElementById('lightbox').classList.remove('show');
}

function switchTab(t){
    stopCarousel();

    document.querySelectorAll('.tab-item').forEach(e=>e.classList.remove('active'));

    if(t==='elder'){
        document.getElementById('view-elder').classList.remove('hidden');
        document.getElementById('view-setting').classList.add('hidden');
        document.querySelectorAll('.tab-item')[0].classList.add('active');
        renderHome();
    }else{
        document.getElementById('view-elder').classList.add('hidden');
        document.getElementById('view-setting').classList.remove('hidden');
        document.querySelectorAll('.tab-item')[1].classList.add('active');
        renderSet();
    }
}

function setTheme(theme){
    document.documentElement.setAttribute('data-theme', theme);
    ST.currentTheme = theme;
    sv();
    
    // 更新按钮状态
    document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.themeBtn === theme);
    });
    
    T(t('theme_switched',{name:t('theme_'+theme)}));
}

function getThemeName(theme){
    return t('theme_'+theme);
}

function loadTheme(){
    const saved = ST.currentTheme || 'midnight';
    setTheme(saved);
}

window.onload=()=>{
    const d=ld();
    const savedLang = localStorage.getItem('med_lang') || 'zh';

    ST.meds=d.meds;
    ST.contact=d.contact;
    ST.currentTheme = d.currentTheme || 'white';

    CUR_LANG = savedLang;
    document.documentElement.lang = CUR_LANG === 'ja' ? 'ja' : CUR_LANG === 'en' ? 'en' : 'zh-CN';
    translate();

    updateClock();
    ST.clockTimer=setInterval(updateClock,10000);

    if('Notification' in window&&Notification.permission==='default'){
        Notification.requestPermission();
    }

    initAlarm();
    loadTheme();
    renderHome();
};
</script>

</body>
</html>
